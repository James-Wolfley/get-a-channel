services:
  get-a-channel-bot:
    build: .
    restart: unless-stopped
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN:?set DISCORD_TOKEN in your environment or .env file}
      DATABASE_PATH: /data/bot.db
      CLEANUP_INTERVAL_SECONDS: ${CLEANUP_INTERVAL_SECONDS:-300}
      DEV_GUILD_ID: ${DEV_GUILD_ID:-605392489439821835}
      REGISTER_GLOBAL_COMMANDS: ${REGISTER_GLOBAL_COMMANDS:-true}
    volumes:
      - ./data:/data
