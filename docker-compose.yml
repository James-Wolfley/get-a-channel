services:
  get-a-channel-bot:
    build: .
    restart: unless-stopped
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN:?set DISCORD_TOKEN in your environment or .env file}
      DATABASE_PATH: /data/bot.db
      CLEANUP_INTERVAL_SECONDS: ${CLEANUP_INTERVAL_SECONDS:-300}
    volumes:
      - ./data:/data
